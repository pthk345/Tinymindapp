      - name: Build for iOS simulator first (validate)
        run: |
          xcodebuild \
            -project TinyMind/TinyMind.xcodeproj \
            -scheme TinyMind \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build unsigned IPA
        run: |
          xcodebuild \
            -project TinyMind/TinyMind.xcodeproj \
            -scheme TinyMind \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

          # Package as IPA
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/TinyMind.app Payload/
          zip -r TinyMind.ipa Payload
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TinyMind
          path: TinyMind.ipa
          retention-days: 30
