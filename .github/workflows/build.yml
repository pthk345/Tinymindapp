name: Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ios-deploy
        run: brew install ios-deploy

      - name: Create Xcode project structure
        run: |
          mkdir -p TinyMind/TinyMind.xcodeproj
          mkdir -p TinyMind/TinyMind

      - name: Copy web files
        run: |
          cp index.html TinyMind/TinyMind/index.html

      - name: Write AppDelegate.swift
        run: |
          cat > TinyMind/TinyMind/AppDelegate.swift << 'SWIFT'
          import UIKit
          import WebKit

          @main
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?

              func application(_ application: UIApplication,
                               didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  let vc = ViewController()
                  window?.rootViewController = vc
                  window?.makeKeyAndVisible()
                  return true
              }
          }
          SWIFT

      - name: Write ViewController.swift
        run: |
          cat > TinyMind/TinyMind/ViewController.swift << 'SWIFT'
          import UIKit
          import WebKit

          class ViewController: UIViewController, WKNavigationDelegate {
              var webView: WKWebView!

              override func viewDidLoad() {
                  super.viewDidLoad()

                  let config = WKWebViewConfiguration()
                  config.allowsInlineMediaPlayback = true
                  config.mediaTypesRequiringUserActionForPlayback = []

                  webView = WKWebView(frame: .zero, configuration: config)
                  webView.navigationDelegate = self
                  webView.scrollView.contentInsetAdjustmentBehavior = .never
                  webView.translatesAutoresizingMaskIntoConstraints = false

                  view.addSubview(webView)
                  NSLayoutConstraint.activate([
                      webView.topAnchor.constraint(equalTo: view.topAnchor),
                      webView.bottomAnchor.constraint(equalTo: view.bottomAnchor),
                      webView.leadingAnchor.constraint(equalTo: view.leadingAnchor),
                      webView.trailingAnchor.constraint(equalTo: view.trailingAnchor),
                  ])

                  if let url = Bundle.main.url(forResource: "index", withExtension: "html") {
                      webView.loadFileURL(url, allowingReadAccessTo: url.deletingLastPathComponent())
                  }
              }
          }
          SWIFT

      - name: Write Info.plist
        run: |
          cat > TinyMind/TinyMind/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>TinyMind</string>
              <key>CFBundleDisplayName</key>
              <string>Tiny Mind</string>
              <key>CFBundleIdentifier</key>
              <string>com.pthk345.tinymind</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleExecutable</key>
              <string>TinyMind</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UIRequiredDeviceCapabilities</key>
              <array><string>armv7</string></array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
              <key>UIStatusBarStyle</key>
              <string>UIStatusBarStyleDefault</string>
              <key>UIViewControllerBasedStatusBarAppearance</key>
              <false/>
              <key>NSAppTransportSecurity</key>
              <dict>
                  <key>NSAllowsLocalNetworking</key>
                  <true/>
              </dict>
          </dict>
          </plist>
          PLIST

