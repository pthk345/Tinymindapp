name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Copy web assets
        run: |
          chmod +x node_modules/.bin/cap
          npx cap copy ios

      - name: Pod install
        working-directory: ios/App
        run: pod install

      - name: Build unsigned IPA
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive

          mkdir -p $RUNNER_TEMP/Payload
          cp -r "$RUNNER_TEMP/App.xcarchive/Products/Applications/App.app" $RUNNER_TEMP/Payload/
          cd $RUNNER_TEMP && zip -r TinymindApp.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TinymindApp-unsigned
          path: ${{ runner.temp }}/TinymindApp.ipa
          retention-days: 7